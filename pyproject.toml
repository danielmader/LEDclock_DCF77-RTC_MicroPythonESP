
[tool.ruff]
line-length = 160
indent-width = 4
target-version = "py310"
exclude = [
    "__init__.py",
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
    "*.ipynb",
]

[tool.ruff.lint]
select = ["E", "F", "I", "C90"]
ignore = ["E201", "E202", "E203", "E221", "E222", "E241", "E265", "E266"]

[tool.ruff.lint.mccabe]
max-complexity = 10
